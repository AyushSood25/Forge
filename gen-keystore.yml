# ONE-TIME: generates your Android signing keystore on GitHub's servers, so you
# don't need Java/keytool on any computer. Run it once from the Actions tab.
#
# BEFORE running, create these three repository secrets (any values you choose):
#   ANDROID_KEYSTORE_PASSWORD   e.g. a long random string
#   ANDROID_KEY_PASSWORD        e.g. another long random string
#   ANDROID_KEY_ALIAS           e.g. forge
#
# AFTER it runs: download the "forge-keystore" artifact, open forge.keystore.b64.txt,
# copy its entire contents into a NEW secret named ANDROID_KEYSTORE_BASE64.
# Keep forge.keystore somewhere safe and delete the artifact afterwards.
# Use a PRIVATE repo (the artifact contains your keystore).

name: Generate signing keystore

on:
  workflow_dispatch:

jobs:
  keystore:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Create keystore
        env:
          STORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASS: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          keytool -genkeypair -v \
            -keystore forge.keystore \
            -alias "$KEY_ALIAS" \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "$STORE_PASS" \
            -keypass "$KEY_PASS" \
            -dname "CN=Forge, OU=Personal, O=Forge, L=Ahmedabad, S=Gujarat, C=IN"
          base64 -w0 forge.keystore > forge.keystore.b64.txt
          echo "Keystore created."

      - name: Upload keystore artifact
        uses: actions/upload-artifact@v4
        with:
          name: forge-keystore
          path: |
            forge.keystore
            forge.keystore.b64.txt
          if-no-files-found: error
